openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: AOneLazer Finance API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: auth
  - name: expenses
  - name: investments
  - name: dashboard
  - name: transactions
  - name: budgets
  - name: analytics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated

  /auth/update-profile:
    patch:
      operationId: updateProfile
      tags: [auth]
      summary: Update profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProfileBody"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordBody"
      responses:
        "200":
          description: Password changed
        "400":
          description: Wrong current password

  /auth/change-username:
    post:
      operationId: changeUsername
      tags: [auth]
      summary: Change username
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeUsernameBody"
      responses:
        "200":
          description: Username changed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Username already taken

  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /dashboard/spending-trend:
    get:
      operationId: getSpendingTrend
      tags: [dashboard]
      summary: Get spending trend
      responses:
        "200":
          description: Spending trend data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SpendingTrendPoint"

  /dashboard/category-breakdown:
    get:
      operationId: getCategoryBreakdown
      tags: [dashboard]
      summary: Get expense category breakdown
      responses:
        "200":
          description: Category breakdown data
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryBreakdown"

  /expenses:
    get:
      operationId: listExpenses
      tags: [expenses]
      summary: List expenses
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: startDate
          in: query
          schema:
            type: string
        - name: endDate
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Expense"
    post:
      operationId: createExpense
      tags: [expenses]
      summary: Create an expense
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateExpenseBody"
      responses:
        "201":
          description: Created expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"

  /expenses/{id}:
    get:
      operationId: getExpense
      tags: [expenses]
      summary: Get expense by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
        "404":
          description: Not found
    patch:
      operationId: updateExpense
      tags: [expenses]
      summary: Update an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateExpenseBody"
      responses:
        "200":
          description: Updated expense
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Expense"
    delete:
      operationId: deleteExpense
      tags: [expenses]
      summary: Delete an expense
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /investments:
    get:
      operationId: listInvestments
      tags: [investments]
      summary: List investments
      responses:
        "200":
          description: List of investments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Investment"
    post:
      operationId: createInvestment
      tags: [investments]
      summary: Add an investment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateInvestmentBody"
      responses:
        "201":
          description: Created investment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investment"

  /investments/{id}:
    patch:
      operationId: updateInvestment
      tags: [investments]
      summary: Update an investment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateInvestmentBody"
      responses:
        "200":
          description: Updated investment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Investment"
    delete:
      operationId: deleteInvestment
      tags: [investments]
      summary: Delete an investment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /investments/portfolio-summary:
    get:
      operationId: getPortfolioSummary
      tags: [investments]
      summary: Get portfolio summary
      responses:
        "200":
          description: Portfolio summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioSummary"

  /transactions:
    get:
      operationId: listTransactions
      tags: [transactions]
      summary: List recent transactions
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of transactions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Transaction"
    post:
      operationId: createTransaction
      tags: [transactions]
      summary: Create a transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTransactionBody"
      responses:
        "201":
          description: Created transaction
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Transaction"

  /transactions/{id}:
    delete:
      operationId: deleteTransaction
      tags: [transactions]
      summary: Delete a transaction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /budgets:
    get:
      operationId: listBudgets
      tags: [budgets]
      summary: List budgets
      responses:
        "200":
          description: List of budgets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Budget"
    post:
      operationId: createBudget
      tags: [budgets]
      summary: Create a budget
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBudgetBody"
      responses:
        "201":
          description: Created budget
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"

  /budgets/{id}:
    patch:
      operationId: updateBudget
      tags: [budgets]
      summary: Update a budget
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBudgetBody"
      responses:
        "200":
          description: Updated budget
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Budget"
    delete:
      operationId: deleteBudget
      tags: [budgets]
      summary: Delete a budget
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /analytics/monthly-summary:
    get:
      operationId: getMonthlySummary
      tags: [analytics]
      summary: Get monthly analytics summary
      responses:
        "200":
          description: Monthly summary
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MonthlySummaryItem"

  /analytics/top-expenses:
    get:
      operationId: getTopExpenses
      tags: [analytics]
      summary: Get top expense categories
      responses:
        "200":
          description: Top expenses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/TopExpenseItem"

  /analytics/net-worth-trend:
    get:
      operationId: getNetWorthTrend
      tags: [analytics]
      summary: Get net worth trend
      responses:
        "200":
          description: Net worth trend
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NetWorthTrendPoint"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        avatar:
          type: ["string", "null"]
        role:
          type: string
      required: [id, username, name, role]

    UpdateProfileBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        avatar:
          type: ["string", "null"]

    ChangePasswordBody:
      type: object
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string
      required: [currentPassword, newPassword]

    ChangeUsernameBody:
      type: object
      properties:
        newUsername:
          type: string
        password:
          type: string
      required: [newUsername, password]

    DashboardSummary:
      type: object
      properties:
        totalBalance:
          type: number
        monthlyIncome:
          type: number
        monthlyExpenses:
          type: number
        totalInvestments:
          type: number
        savingsRate:
          type: number
        monthlyChange:
          type: number
        expenseChange:
          type: number
        investmentGain:
          type: number
      required: [totalBalance, monthlyIncome, monthlyExpenses, totalInvestments, savingsRate, monthlyChange, expenseChange, investmentGain]

    SpendingTrendPoint:
      type: object
      properties:
        month:
          type: string
        expenses:
          type: number
        income:
          type: number
        savings:
          type: number
      required: [month, expenses, income, savings]

    CategoryBreakdown:
      type: object
      properties:
        category:
          type: string
        amount:
          type: number
        percentage:
          type: number
        color:
          type: string
      required: [category, amount, percentage, color]

    Expense:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        amount:
          type: number
        category:
          type: string
        description:
          type: ["string", "null"]
        date:
          type: string
        createdAt:
          type: string
      required: [id, title, amount, category, date, createdAt]

    CreateExpenseBody:
      type: object
      properties:
        title:
          type: string
        amount:
          type: number
        category:
          type: string
        description:
          type: ["string", "null"]
        date:
          type: string
      required: [title, amount, category, date]

    UpdateExpenseBody:
      type: object
      properties:
        title:
          type: string
        amount:
          type: number
        category:
          type: string
        description:
          type: ["string", "null"]
        date:
          type: string

    Investment:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        ticker:
          type: ["string", "null"]
        type:
          type: string
        currentValue:
          type: number
        purchaseValue:
          type: number
        shares:
          type: ["number", "null"]
        gainLoss:
          type: number
        gainLossPercent:
          type: number
        createdAt:
          type: string
      required: [id, name, type, currentValue, purchaseValue, gainLoss, gainLossPercent, createdAt]

    CreateInvestmentBody:
      type: object
      properties:
        name:
          type: string
        ticker:
          type: ["string", "null"]
        type:
          type: string
        currentValue:
          type: number
        purchaseValue:
          type: number
        shares:
          type: ["number", "null"]
      required: [name, type, currentValue, purchaseValue]

    UpdateInvestmentBody:
      type: object
      properties:
        name:
          type: string
        ticker:
          type: ["string", "null"]
        type:
          type: string
        currentValue:
          type: number
        purchaseValue:
          type: number
        shares:
          type: ["number", "null"]

    PortfolioSummary:
      type: object
      properties:
        totalValue:
          type: number
        totalGainLoss:
          type: number
        totalGainLossPercent:
          type: number
        allocation:
          type: array
          items:
            $ref: "#/components/schemas/AllocationItem"
      required: [totalValue, totalGainLoss, totalGainLossPercent, allocation]

    AllocationItem:
      type: object
      properties:
        type:
          type: string
        value:
          type: number
        percentage:
          type: number
        color:
          type: string
      required: [type, value, percentage, color]

    Transaction:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        amount:
          type: number
        type:
          type: string
        category:
          type: string
        date:
          type: string
        icon:
          type: ["string", "null"]
      required: [id, title, amount, type, category, date]

    CreateTransactionBody:
      type: object
      properties:
        title:
          type: string
        amount:
          type: number
        type:
          type: string
        category:
          type: string
        date:
          type: string
        icon:
          type: ["string", "null"]
      required: [title, amount, type, category, date]

    Budget:
      type: object
      properties:
        id:
          type: integer
        category:
          type: string
        limit:
          type: number
        spent:
          type: number
        remaining:
          type: number
        percentage:
          type: number
        color:
          type: string
        createdAt:
          type: string
      required: [id, category, limit, spent, remaining, percentage, color, createdAt]

    CreateBudgetBody:
      type: object
      properties:
        category:
          type: string
        limit:
          type: number
        color:
          type: string
      required: [category, limit, color]

    UpdateBudgetBody:
      type: object
      properties:
        category:
          type: string
        limit:
          type: number
        color:
          type: string

    MonthlySummaryItem:
      type: object
      properties:
        month:
          type: string
        totalExpenses:
          type: number
        totalIncome:
          type: number
        netSavings:
          type: number
        savingsRate:
          type: number
        expenseCount:
          type: integer
      required: [month, totalExpenses, totalIncome, netSavings, savingsRate, expenseCount]

    TopExpenseItem:
      type: object
      properties:
        category:
          type: string
        amount:
          type: number
        count:
          type: integer
        percentage:
          type: number
        color:
          type: string
      required: [category, amount, count, percentage, color]

    NetWorthTrendPoint:
      type: object
      properties:
        month:
          type: string
        netWorth:
          type: number
        investments:
          type: number
        cash:
          type: number
      required: [month, netWorth, investments, cash]
